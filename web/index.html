<!DOCTYPE html>
<html class="dark" lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="HabitFlow — Bangun kebiasaan konsisten dengan effort minimal">
    <meta name="theme-color" content="#2ec2b3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>HabitFlow</title>
    <link rel="manifest" href="/manifest.json?v=3">
    <link rel="icon" href="/icons/favicon.svg?v=3" type="image/svg+xml">
    <link rel="shortcut icon" href="/icons/favicon.svg?v=3" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2ec2b3",
              "background-dark": "#0b1215",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "0.75rem",
              "xl": "0.75rem",
              "2xl": "1rem",
              "full": "9999px"
            },
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="bg-background-dark font-display text-slate-200 antialiased min-h-screen">
    <div id="app"></div>
    <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2"></div>

    <script src="/js/api.js"></script>
    <script src="/js/icons.js"></script>
    <script src="/js/app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
          .then(r => console.log('SW registered:', r.scope))
          .catch(e => console.error('SW error:', e));
      }
    </script>
</body>
</html>
