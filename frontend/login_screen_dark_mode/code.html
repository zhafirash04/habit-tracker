<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2ec2b3",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0b1215",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.75rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-200 antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-x-hidden p-4">
<!-- Background Decorative Elements -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[50%] h-[50%] rounded-full bg-primary/10 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-primary/5 blur-[120px]"></div>
</div>
<div class="relative z-10 w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-8 flex flex-col items-center gap-2">
<div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-primary text-white shadow-lg shadow-primary/20">
<span class="material-symbols-outlined !text-4xl">event_repeat</span>
</div>
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">HabitFlow</h1>
</div>
<!-- Login Card -->
<div class="w-full rounded-2xl bg-white dark:bg-slate-900/50 backdrop-blur-sm p-8 shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800/50">
<div class="mb-8">
<h2 class="text-2xl font-bold leading-tight text-slate-900 dark:text-white">Masuk ke HabitFlow</h2>
<p class="mt-2 text-slate-500 dark:text-slate-400">Silakan masukkan detail akun Anda</p>
</div>
<form action="#" class="space-y-5" method="POST">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium leading-none text-slate-700 dark:text-slate-300">Email</label>
<div class="group relative flex w-full items-center">
<div class="absolute left-3 text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined !text-[20px]">mail</span>
</div>
<input class="flex h-12 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 px-10 py-2 text-sm ring-offset-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:text-slate-100" placeholder="nama@email.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex items-center justify-between">
<label class="text-sm font-medium leading-none text-slate-700 dark:text-slate-300">Kata Sandi</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">Lupa sandi?</a>
</div>
<div class="group relative flex w-full items-center">
<div class="absolute left-3 text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined !text-[20px]">lock</span>
</div>
<input class="flex h-12 w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 px-10 py-2 text-sm ring-offset-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all dark:text-slate-100" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined !text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-2">
<input class="h-4 w-4 rounded border-slate-300 dark:border-slate-700 bg-transparent text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-sm font-medium leading-none text-slate-600 dark:text-slate-400 select-none" for="remember">Ingat saya di perangkat ini</label>
</div>
<!-- Submit Button -->
<button class="flex w-full items-center justify-center rounded-xl bg-primary h-12 px-4 text-sm font-bold text-white transition-all hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary/50 active:scale-[0.98] shadow-lg shadow-primary/20" type="submit">
                        Masuk
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-slate-200 dark:border-slate-800"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-2 text-slate-500">Atau masuk dengan</span>
</div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-1 gap-4">
<button class="flex w-full items-center justify-center gap-2 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800/50 h-11 px-4 text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
<svg class="h-5 w-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Google
                    </button>
</div>
</div>
<!-- Footer Link -->
<p class="mt-8 text-center text-sm text-slate-600 dark:text-slate-400">
                Belum punya akun? 
                <a class="font-bold text-primary hover:underline" href="#">Daftar sekarang</a>
</p>
<div class="mt-12 flex gap-6 text-xs text-slate-400">
<a class="hover:text-primary" href="#">Ketentuan Layanan</a>
<a class="hover:text-primary" href="#">Kebijakan Privasi</a>
<a class="hover:text-primary" href="#">Bantuan</a>
</div>
</div>
</div>
</body></html>
